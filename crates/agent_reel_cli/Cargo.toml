[package]
name = "agent_reel_cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description.workspace = true
repository.workspace = true
readme.workspace = true
rust-version.workspace = true

[[bin]]
name = "agent-reel"
path = "src/main.rs"

[dependencies]
agent_reel_adapters = { workspace = true }
agent_reel_auth_github = { workspace = true }
agent_reel_core = { workspace = true }
agent_reel_directory = { workspace = true }
agent_reel_edge = { workspace = true }
agent_reel_highlight = { workspace = true }
agent_reel_ingest = { workspace = true }
agent_reel_install = { workspace = true }
agent_reel_p2p_proto = { workspace = true }
agent_reel_redaction = { workspace = true }
agent_reel_security = { workspace = true }
agent_reel_server = { workspace = true }
agent_reel_story = { workspace = true }
agent_reel_summarize = { workspace = true }
clap = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["serde"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[lints]
workspace = true
