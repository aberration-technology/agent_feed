<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>feed</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <style>
/*__REEL_CSS__*/
    </style>
  </head>
  <body data-view="__REEL_VIEW__">
    <main class="reel" aria-live="polite">
      <header class="topbar">
        <a class="brand" href="https://feed.aberration.technology/">feed</a>
        <div class="status">
          <span id="live-state">live</span>
          <span id="clock">--:--</span>
          <span id="source-count">0 src</span>
        </div>
      </header>

      <nav class="mode-switcher" id="mode-switcher" hidden aria-label="feed mode">
        <a id="mode-discovery" href="#">discover</a>
        <a id="mode-following" href="#">following</a>
      </nav>

      <section class="stage" id="stage">
        <div class="publisher" id="publisher" hidden>
          <img id="publisher-avatar" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer">
          <span id="publisher-label"></span>
        </div>
        <div class="eyebrow" id="eyebrow">local feed</div>
        <h1 id="headline">waiting for signal</h1>
        <p class="deck" id="deck">no display-safe activity has reached the feed yet.</p>
        <figure class="headline-image" id="headline-image" hidden>
          <img id="headline-image-img" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer">
        </figure>
        <a class="auth-action" id="auth-action" hidden rel="noopener noreferrer">sign in with github</a>
        <div class="chips" id="chips">
          <span>privacy on</span>
        </div>
        <div class="stage-progress" id="stage-progress" aria-hidden="true" hidden><span></span></div>
      </section>

      <section class="timeline" id="timeline" hidden aria-label="feed timeline"></section>

      <footer class="ticker">
        <span id="ticker">activity is reduced before display</span>
        <span class="footer-rev" id="footer-rev">rev dev</span>
        <nav class="footer-links" aria-label="site links">
          <a href="https://aberration.technology/" rel="noopener noreferrer">aberration</a>
          <a href="https://github.com/aberration-technology" rel="noopener noreferrer">code</a>
        </nav>
      </footer>
    </main>
    <script>
/*__FEED_CONFIG__*/
    </script>
    <script type="module">
/*__REEL_JS__*/
    </script>
  </body>
</html>
