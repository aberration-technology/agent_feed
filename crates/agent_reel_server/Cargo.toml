[package]
name = "agent_reel_server"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
agent_reel_core = { workspace = true }
agent_reel_highlight = { workspace = true }
agent_reel_identity = { workspace = true }
agent_reel_ingest = { workspace = true }
agent_reel_metrics = { workspace = true }
agent_reel_redaction = { workspace = true }
agent_reel_reel = { workspace = true }
agent_reel_security = { workspace = true }
agent_reel_store = { workspace = true }
agent_reel_story = { workspace = true }
agent_reel_ui = { workspace = true }
agent_reel_views = { workspace = true }
axum = { workspace = true, features = ["json", "tokio"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["serde", "serde-well-known"] }
tokio = { workspace = true, features = ["macros", "net", "rt-multi-thread", "signal", "sync"] }
tokio-stream = { workspace = true, features = ["sync"] }
tower-http = { workspace = true, features = ["trace"] }
tracing = { workspace = true }

[lints]
workspace = true
