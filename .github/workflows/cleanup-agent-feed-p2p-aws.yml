name: cleanup feed p2p aws

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment containing cleanup AWS settings.
        required: true
        default: agent-feed-p2p-production
        type: string
      terraform_workspace:
        description: Terraform workspace name.
        required: true
        default: mainnet
        type: string
      destroy:
        description: Destroy the Terraform-managed stack.
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: cleanup-feed-p2p-aws-${{ github.event.inputs.environment }}-${{ github.event.inputs.terraform_workspace }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      TF_ROOT: crates/agent_feed_p2p/deploy/terraform/aws
      TF_WORKSPACE_NAME: ${{ github.event.inputs.terraform_workspace }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: resolve aws session settings
        shell: bash
        env:
          AWS_REGION_VAR: ${{ vars.AGENT_FEED_P2P_AWS_REGION }}
          AWS_ROLE_ARN_VAR: ${{ vars.AGENT_FEED_P2P_AWS_CLEANUP_ROLE_ARN }}
          FALLBACK_AWS_ROLE_ARN_VAR: ${{ vars.AGENT_FEED_P2P_AWS_ROLE_ARN }}
          STACK_NAME_VAR: ${{ vars.AGENT_FEED_P2P_STACK_NAME }}
          TERRAFORM_STATE_BUCKET_VAR: ${{ vars.AGENT_FEED_P2P_TERRAFORM_STATE_BUCKET }}
          TERRAFORM_STATE_KEY_VAR: ${{ vars.AGENT_FEED_P2P_TERRAFORM_STATE_KEY }}
        run: |
          set -euo pipefail
          role_arn="${AWS_ROLE_ARN_VAR:-${FALLBACK_AWS_ROLE_ARN_VAR:-}}"
          aws_region="${AWS_REGION_VAR:-us-east-2}"
          aws_account_id="$(cut -d: -f5 <<<"$role_arn")"
          stack_name="${STACK_NAME_VAR:-agent-feed-p2p-production}"
          : "${role_arn:?missing AGENT_FEED_P2P_AWS_CLEANUP_ROLE_ARN or AGENT_FEED_P2P_AWS_ROLE_ARN}"
          {
            echo "AWS_REGION=$aws_region"
            echo "AWS_ROLE_ARN=$role_arn"
            echo "AWS_ACCOUNT_ID=$aws_account_id"
            echo "TF_STATE_BUCKET=${TERRAFORM_STATE_BUCKET_VAR:-agent-feed-p2p-tfstate-${aws_account_id}-${aws_region}}"
            echo "TF_STATE_KEY=${TERRAFORM_STATE_KEY_VAR:-${stack_name}/${TF_WORKSPACE_NAME}/terraform.tfstate}"
          } >>"$GITHUB_ENV"

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: feed-p2p-cleanup-${{ github.run_id }}
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3

      - name: terraform init
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true"

      - name: terraform workspace
        working-directory: ${{ env.TF_ROOT }}
        run: terraform workspace select "$TF_WORKSPACE_NAME"

      - name: terraform destroy
        if: ${{ github.event.inputs.destroy == 'true' }}
        working-directory: ${{ env.TF_ROOT }}
        run: terraform destroy -auto-approve

      - name: dry-run notice
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: echo "destroy=false; no destructive action taken"
