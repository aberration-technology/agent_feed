name: deploy feed p2p aws

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment containing AWS/OAuth settings.
        required: true
        default: agent-feed-p2p-production
        type: string
      terraform_workspace:
        description: Terraform workspace name.
        required: true
        default: mainnet
        type: string
      apply:
        description: Apply the Terraform plan.
        required: true
        default: true
        type: boolean
      deploy_pages_after_apply:
        description: Dispatch the Pages workflow after a successful apply.
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: deploy-feed-p2p-aws-${{ inputs.environment || 'agent-feed-p2p-production' }}-${{ inputs.terraform_workspace || 'mainnet' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEPLOY_ENVIRONMENT: ${{ inputs.environment || 'agent-feed-p2p-production' }}
  TF_WORKSPACE_NAME: ${{ inputs.terraform_workspace || 'mainnet' }}
  APPLY_TERRAFORM: ${{ github.event_name == 'push' && 'true' || inputs.apply && 'true' || 'false' }}
  DEPLOY_PAGES_AFTER_APPLY: ${{ github.event_name == 'push' && 'false' || inputs.deploy_pages_after_apply && 'true' || 'false' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'agent-feed-p2p-production' }}
    env:
      TF_ROOT: crates/agent_feed_p2p/deploy/terraform/aws

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: resolve deployment settings
        shell: bash
        env:
          VAR_AWS_REGION: ${{ vars.AGENT_FEED_P2P_AWS_REGION }}
          VAR_AWS_ROLE_ARN: ${{ vars.AGENT_FEED_P2P_AWS_ROLE_ARN }}
          VAR_STACK_NAME: ${{ vars.AGENT_FEED_P2P_STACK_NAME }}
          VAR_EDGE_DOMAIN_NAME: ${{ vars.AGENT_FEED_P2P_EDGE_DOMAIN_NAME }}
          VAR_BROWSER_APP_BASE_URL: ${{ vars.AGENT_FEED_P2P_BROWSER_APP_BASE_URL }}
          VAR_BROWSER_APP_PAGES_DOMAIN_TARGET: ${{ vars.AGENT_FEED_P2P_BROWSER_APP_PAGES_DOMAIN_TARGET }}
          VAR_GITHUB_CALLBACK_URL: ${{ vars.AGENT_FEED_P2P_GITHUB_CALLBACK_URL }}
          VAR_ROUTE53_ZONE_NAME: ${{ vars.AGENT_FEED_P2P_ROUTE53_ZONE_NAME }}
          VAR_TLS_CONTACT_EMAIL: ${{ vars.AGENT_FEED_P2P_TLS_CONTACT_EMAIL }}
          VAR_NETWORK_ID: ${{ vars.AGENT_FEED_P2P_NETWORK_ID }}
          VAR_CANARY_GITHUB_LOGIN: ${{ vars.AGENT_FEED_P2P_CANARY_GITHUB_LOGIN }}
          VAR_CANARY_FEED_LABEL: ${{ vars.AGENT_FEED_P2P_CANARY_FEED_LABEL }}
          VAR_GITHUB_REQUIRED_ORG: ${{ vars.AGENT_FEED_P2P_GITHUB_REQUIRED_ORG }}
          VAR_GITHUB_REQUIRED_REPO: ${{ vars.AGENT_FEED_P2P_GITHUB_REQUIRED_REPO }}
          VAR_GITHUB_ADMIN_LOGINS: ${{ vars.AGENT_FEED_P2P_GITHUB_ADMIN_LOGINS }}
          VAR_ALARM_SNS_TOPIC_ARN: ${{ vars.AGENT_FEED_P2P_ALARM_SNS_TOPIC_ARN }}
          VAR_SECRET_PARAMETER_PREFIX: ${{ vars.AGENT_FEED_P2P_SECRET_PARAMETER_PREFIX }}
          VAR_ALLOW_ROUTE53_ZONE_APEX_RECORDS: ${{ vars.AGENT_FEED_P2P_ALLOW_ROUTE53_ZONE_APEX_RECORDS }}
          VAR_TERRAFORM_STATE_BUCKET: ${{ vars.AGENT_FEED_P2P_TERRAFORM_STATE_BUCKET }}
          VAR_TERRAFORM_STATE_KEY: ${{ vars.AGENT_FEED_P2P_TERRAFORM_STATE_KEY }}
          VAR_BINARY_S3_KEY: ${{ vars.AGENT_FEED_P2P_BINARY_S3_KEY }}
        run: |
          set -euo pipefail
          secret_parameter_prefix="${VAR_SECRET_PARAMETER_PREFIX:-/agent-feed-p2p/mainnet/edge}"
          allow_apex="${VAR_ALLOW_ROUTE53_ZONE_APEX_RECORDS:-false}"
          aws_region="${VAR_AWS_REGION:-us-east-2}"
          aws_role_arn="${VAR_AWS_ROLE_ARN:-}"
          stack_name="${VAR_STACK_NAME:-agent-feed-p2p-production}"
          edge_domain_name="${VAR_EDGE_DOMAIN_NAME:-api.feed.aberration.technology}"
          edge_base_url="https://${edge_domain_name}"
          browser_app_base_url="${VAR_BROWSER_APP_BASE_URL:-https://feed.aberration.technology}"
          github_callback_url="${VAR_GITHUB_CALLBACK_URL:-${edge_base_url%/}/callback/github}"
          aws_account_id="$(cut -d: -f5 <<<"$aws_role_arn")"
          state_bucket="${VAR_TERRAFORM_STATE_BUCKET:-agent-feed-p2p-tfstate-${aws_account_id}-${aws_region}}"
          binary_s3_key="${VAR_BINARY_S3_KEY:-releases/${GITHUB_SHA}/agent-feed}"
          environment_name="$DEPLOY_ENVIRONMENT"
          environment_name="${environment_name#agent-feed-p2p-}"
          if [ -z "$aws_role_arn" ]; then
            echo "AGENT_FEED_P2P_AWS_ROLE_ARN must be set on the selected GitHub environment" >&2
            exit 1
          fi
          {
            echo "AWS_REGION=$aws_region"
            echo "AWS_ROLE_ARN=$aws_role_arn"
            echo "AWS_ACCOUNT_ID=$aws_account_id"
            echo "TF_STATE_BUCKET=$state_bucket"
            echo "TF_STATE_KEY=${VAR_TERRAFORM_STATE_KEY:-${stack_name}/${TF_WORKSPACE_NAME}/terraform.tfstate}"
            echo "AGENT_FEED_BINARY_S3_KEY=$binary_s3_key"
            echo "TF_VAR_aws_region=$aws_region"
            echo "TF_VAR_environment_name=$environment_name"
            echo "TF_VAR_stack_name=$stack_name"
            echo "TF_VAR_agent_feed_install_source=s3"
            echo "TF_VAR_agent_feed_binary_s3_uri=s3://${state_bucket}/${binary_s3_key}"
            echo "TF_VAR_agent_feed_binary_s3_bucket=$state_bucket"
            echo "TF_VAR_agent_feed_binary_s3_key=$binary_s3_key"
            echo "TF_VAR_edge_domain_name=$edge_domain_name"
            echo "TF_VAR_browser_app_base_url=$browser_app_base_url"
            echo "TF_VAR_browser_app_pages_domain_target=${VAR_BROWSER_APP_PAGES_DOMAIN_TARGET:-aberration-technology.github.io}"
            echo "TF_VAR_github_callback_url=$github_callback_url"
            echo "TF_VAR_route53_zone_name=${VAR_ROUTE53_ZONE_NAME:-aberration.technology}"
            echo "TF_VAR_tls_contact_email=${VAR_TLS_CONTACT_EMAIL:-admin@aberration.technology}"
            echo "TF_VAR_network_id=${VAR_NETWORK_ID:-agent-feed-mainnet}"
            echo "TF_VAR_canary_github_login=${VAR_CANARY_GITHUB_LOGIN:-mosure}"
            echo "TF_VAR_canary_feed_label=${VAR_CANARY_FEED_LABEL:-workstation}"
            echo "TF_VAR_github_required_org=${VAR_GITHUB_REQUIRED_ORG:-}"
            echo "TF_VAR_github_required_repo=${VAR_GITHUB_REQUIRED_REPO:-}"
            echo "TF_VAR_alarm_sns_topic_arn=${VAR_ALARM_SNS_TOPIC_ARN:-}"
            echo "TF_VAR_secret_parameter_prefix=$secret_parameter_prefix"
            echo "TF_VAR_allow_route53_zone_apex_records=$allow_apex"
            echo "TF_VAR_github_client_id_parameter_name=$secret_parameter_prefix/github_client_id"
            echo "TF_VAR_github_client_secret_parameter_name=$secret_parameter_prefix/github_client_secret"
            echo "GITHUB_CLIENT_ID_PARAMETER_NAME=$secret_parameter_prefix/github_client_id"
            echo "GITHUB_CLIENT_SECRET_PARAMETER_NAME=$secret_parameter_prefix/github_client_secret"
          } >>"$GITHUB_ENV"
          if [ -n "${VAR_GITHUB_ADMIN_LOGINS:-}" ]; then
            admin_logins="$(
              python3 -c 'import json, os; print(json.dumps([x.strip() for x in os.environ["VAR_GITHUB_ADMIN_LOGINS"].split(",") if x.strip()]))'
            )"
            echo "TF_VAR_github_admin_logins=$admin_logins" >>"$GITHUB_ENV"
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: feed-p2p-deploy-${{ github.run_id }}
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: verify aws account
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          if [ "$account_id" != "$AWS_ACCOUNT_ID" ]; then
            echo "assumed aws account mismatch: expected $AWS_ACCOUNT_ID got $account_id" >&2
            exit 1
          fi

      - name: sync edge oauth secrets
        shell: bash
        env:
          SECRET_GITHUB_CLIENT_ID: ${{ secrets.AGENT_FEED_P2P_GITHUB_CLIENT_ID }}
          SECRET_GITHUB_CLIENT_SECRET: ${{ secrets.AGENT_FEED_P2P_GITHUB_CLIENT_SECRET }}
          LEGACY_OAUTH_CLIENT_ID: ${{ secrets.AGENT_FEED_P2P_OAUTH_CLIENT_ID }}
          LEGACY_OAUTH_CLIENT_SECRET: ${{ secrets.AGENT_FEED_P2P_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          client_id="${SECRET_GITHUB_CLIENT_ID:-${LEGACY_OAUTH_CLIENT_ID:-}}"
          client_secret="${SECRET_GITHUB_CLIENT_SECRET:-${LEGACY_OAUTH_CLIENT_SECRET:-}}"
          if [ -z "$client_id" ] || [ -z "$client_secret" ]; then
            echo "GitHub OAuth secrets are required for production edge auth." >&2
            echo "Set AGENT_FEED_P2P_GITHUB_CLIENT_ID and AGENT_FEED_P2P_GITHUB_CLIENT_SECRET on the selected environment." >&2
            exit 1
          fi
          aws ssm put-parameter \
            --name "$GITHUB_CLIENT_ID_PARAMETER_NAME" \
            --type SecureString \
            --value "$client_id" \
            --overwrite
          aws ssm put-parameter \
            --name "$GITHUB_CLIENT_SECRET_PARAMETER_NAME" \
            --type SecureString \
            --value "$client_secret" \
            --overwrite

      - name: bootstrap terraform state bucket
        shell: bash
        run: |
          set -euo pipefail
          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$TF_STATE_BUCKET" --region "$AWS_REGION"
            else
              aws s3api create-bucket \
                --bucket "$TF_STATE_BUCKET" \
                --region "$AWS_REGION" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi
          aws s3api put-public-access-block \
            --bucket "$TF_STATE_BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          aws s3api put-bucket-encryption \
            --bucket "$TF_STATE_BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          aws s3api put-bucket-versioning \
            --bucket "$TF_STATE_BUCKET" \
            --versioning-configuration Status=Enabled

      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: build edge binary
        shell: bash
        run: cargo build --locked --release -p agent_feed_cli --bin agent-feed

      - name: upload edge binary
        shell: bash
        run: aws s3 cp target/release/agent-feed "s3://${TF_STATE_BUCKET}/${AGENT_FEED_BINARY_S3_KEY}"

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3

      - name: terraform fmt
        working-directory: ${{ env.TF_ROOT }}
        run: terraform fmt -check

      - name: terraform init
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true"

      - name: terraform workspace
        working-directory: ${{ env.TF_ROOT }}
        run: terraform workspace select "$TF_WORKSPACE_NAME" || terraform workspace new "$TF_WORKSPACE_NAME"

      - name: terraform validate
        shell: bash
        run: |
          set -euo pipefail
          validate_dir="$RUNNER_TEMP/feed-terraform-validate"
          rm -rf "$validate_dir"
          mkdir -p "$validate_dir"
          cp -R "$TF_ROOT"/. "$validate_dir"/
          rm -rf "$validate_dir/.terraform" "$validate_dir/terraform.tfstate" "$validate_dir/terraform.tfstate.backup"
          perl -0pi -e 's/\n\s*backend\s+"s3"\s+\{\}\n/\n/' "$validate_dir/versions.tf"
          terraform -chdir="$validate_dir" init -backend=false -input=false
          terraform -chdir="$validate_dir" validate

      - name: import existing production stack
        if: ${{ env.APPLY_TERRAFORM == 'true' }}
        working-directory: ${{ env.TF_ROOT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$(terraform state list)" ]; then
            echo "terraform state already has resources; import skipped"
            exit 0
          fi

          try_import() {
            local address="$1"
            local id="$2"
            if [ -z "$id" ] || [ "$id" = "None" ] || [ "$id" = "null" ]; then
              echo "skip import ${address}: empty id"
              return 0
            fi
            terraform import -input=false "$address" "$id" || true
          }

          stack="$TF_VAR_stack_name"
          role_name="${stack}-edge"
          policy_arn="arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
          edge_name="${stack}-edge"

          instances_json="$(
            aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=${edge_name}" "Name=instance-state-name,Values=pending,running,stopping,stopped"
          )"
          instance_id="$(printf '%s' "$instances_json" | jq -r '[.Reservations[].Instances[]] | sort_by(.LaunchTime) | .[0].InstanceId // empty')"
          vpc_id="$(printf '%s' "$instances_json" | jq -r '[.Reservations[].Instances[]] | sort_by(.LaunchTime) | .[0].VpcId // empty')"
          subnet_id="$(printf '%s' "$instances_json" | jq -r '[.Reservations[].Instances[]] | sort_by(.LaunchTime) | .[0].SubnetId // empty')"
          security_group_id="$(printf '%s' "$instances_json" | jq -r '[.Reservations[].Instances[]] | sort_by(.LaunchTime) | .[0].SecurityGroups[0].GroupId // empty')"

          try_import terraform_data.apex_guardrail "$stack"
          try_import aws_instance.edge "$instance_id"
          try_import aws_vpc.edge "$vpc_id"
          try_import aws_subnet.edge "$subnet_id"
          try_import aws_security_group.edge "$security_group_id"

          if [ -n "$vpc_id" ]; then
            igw_id="$(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=${vpc_id}" | jq -r '.InternetGateways[0].InternetGatewayId // empty')"
            try_import aws_internet_gateway.edge "$igw_id"
          fi
          if [ -n "$subnet_id" ]; then
            route_tables_json="$(aws ec2 describe-route-tables --filters "Name=association.subnet-id,Values=${subnet_id}")"
            route_table_id="$(printf '%s' "$route_tables_json" | jq -r '.RouteTables[0].RouteTableId // empty')"
            route_table_association_id="$(printf '%s' "$route_tables_json" | jq -r --arg subnet "$subnet_id" '.RouteTables[0].Associations[]? | select(.SubnetId == $subnet) | .RouteTableAssociationId' | head -n1)"
            try_import aws_route_table.edge "$route_table_id"
            try_import aws_route_table_association.edge "$route_table_association_id"
          fi
          if [ -n "$instance_id" ]; then
            addresses_json="$(aws ec2 describe-addresses --filters "Name=instance-id,Values=${instance_id}")"
            eip_allocation_id="$(printf '%s' "$addresses_json" | jq -r '.Addresses[0].AllocationId // empty')"
            eip_association_id="$(printf '%s' "$addresses_json" | jq -r '.Addresses[0].AssociationId // empty')"
            try_import aws_eip.edge "$eip_allocation_id"
            try_import aws_eip_association.edge "$eip_association_id"
          fi

          try_import aws_iam_role.edge "$role_name"
          try_import aws_iam_role_policy_attachment.ssm_managed_instance "${role_name}/${policy_arn}"
          try_import aws_iam_role_policy.edge_ssm "${role_name}:${stack}-edge-ssm"
          try_import aws_iam_instance_profile.edge "$role_name"

          zone_name="${TF_VAR_route53_zone_name%.}."
          zone_id="$(aws route53 list-hosted-zones-by-name --dns-name "$zone_name" | jq -r --arg name "$zone_name" '.HostedZones[] | select(.Name == $name and .Config.PrivateZone == false) | .Id' | head -n1 | sed 's#/hostedzone/##')"
          if [ -n "$zone_id" ]; then
            browser_host="${TF_VAR_browser_app_base_url#https://}"
            browser_host="${browser_host#http://}"
            browser_host="${browser_host%%/*}"
            try_import aws_route53_record.edge "${zone_id}_${TF_VAR_edge_domain_name}_A"
            try_import aws_route53_record.browser "${zone_id}_${browser_host}_A"
          fi

          alarm_name="$(aws cloudwatch describe-alarms --alarm-names "${stack}-edge-status-check" | jq -r '.MetricAlarms[0].AlarmName // empty')"
          try_import 'aws_cloudwatch_metric_alarm.edge_status[0]' "$alarm_name"

      - name: terraform plan
        working-directory: ${{ env.TF_ROOT }}
        run: terraform plan -out=tfplan

      - name: terraform apply
        if: ${{ env.APPLY_TERRAFORM == 'true' }}
        working-directory: ${{ env.TF_ROOT }}
        run: terraform apply -auto-approve tfplan

      - name: terraform outputs
        if: ${{ env.APPLY_TERRAFORM == 'true' }}
        id: terraform_outputs
        working-directory: ${{ env.TF_ROOT }}
        run: |
          set -euo pipefail
          echo "edge_url=$(terraform output -raw edge_url)" >>"$GITHUB_OUTPUT"
          echo "browser_app_url=$(terraform output -raw browser_app_url)" >>"$GITHUB_OUTPUT"
          echo "route_canary_url=$(terraform output -raw route_canary_url)" >>"$GITHUB_OUTPUT"
          terraform output -json > "$RUNNER_TEMP/feed-terraform-outputs.json"

      - name: upload terraform outputs
        if: ${{ env.APPLY_TERRAFORM == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: feed-terraform-outputs
          path: ${{ runner.temp }}/feed-terraform-outputs.json

      - name: sync edge host
        if: ${{ env.APPLY_TERRAFORM == 'true' }}
        working-directory: ${{ env.TF_ROOT }}
        shell: bash
        run: |
          set -euo pipefail
          instance_id="$(terraform output -raw edge_instance_id)"
          sync_dir="$RUNNER_TEMP/feed-edge-sync"
          mkdir -p "$sync_dir"

          terraform output -raw rendered_caddyfile > "$sync_dir/Caddyfile"
          terraform output -raw rendered_edge_env > "$sync_dir/edge.env"
          terraform output -raw rendered_edge_toml > "$sync_dir/edge.toml"
          terraform output -raw rendered_edge_service_unit > "$sync_dir/agent-feed-edge.service"

          caddy_b64="$(base64 -w0 "$sync_dir/Caddyfile")"
          edge_env_b64="$(base64 -w0 "$sync_dir/edge.env")"
          edge_toml_b64="$(base64 -w0 "$sync_dir/edge.toml")"
          edge_service_b64="$(base64 -w0 "$sync_dir/agent-feed-edge.service")"
          binary_s3_uri="s3://${TF_STATE_BUCKET}/${AGENT_FEED_BINARY_S3_KEY}"

          ssm_ready=false
          for attempt in $(seq 1 60); do
            ec2_state="$(
              aws ec2 describe-instances \
                --region "$AWS_REGION" \
                --instance-ids "$instance_id" \
                --query 'Reservations[0].Instances[0].State.Name' \
                --output text 2>/dev/null || true
            )"
            ssm_ping="$(
              aws ssm describe-instance-information \
                --region "$AWS_REGION" \
                --filters "Key=InstanceIds,Values=${instance_id}" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text 2>/dev/null || true
            )"
            if [ "$ec2_state" = "running" ] && [ "$ssm_ping" = "Online" ]; then
              ssm_ready=true
              break
            fi
            echo "edge instance not ready for ssm yet; ec2=${ec2_state:-unknown} ssm=${ssm_ping:-unknown} retry ${attempt}/60"
            sleep 10
          done
          if [ "$ssm_ready" != "true" ]; then
            echo "edge instance ${instance_id} did not become SSM-ready" >&2
            exit 1
          fi

          parameters="$(
            jq -n \
              --arg binary_s3_uri "$binary_s3_uri" \
              --arg caddy_b64 "$caddy_b64" \
              --arg edge_env_b64 "$edge_env_b64" \
              --arg edge_toml_b64 "$edge_toml_b64" \
              --arg edge_service_b64 "$edge_service_b64" \
              --arg github_client_id_parameter "$GITHUB_CLIENT_ID_PARAMETER_NAME" \
              --arg github_client_secret_parameter "$GITHUB_CLIENT_SECRET_PARAMETER_NAME" \
              '{
                commands: [
                  "set -eux",
                  "export DEBIAN_FRONTEND=noninteractive",
                  "cloud-init status --wait || true",
                  "if ! id agent-feed >/dev/null 2>&1; then sudo useradd --system --home-dir /var/lib/agent-feed --create-home --shell /usr/sbin/nologin agent-feed; fi",
                  "sudo apt-get update",
                  "sudo apt-get install -y --no-install-recommends ca-certificates curl debian-archive-keyring debian-keyring apt-transport-https gnupg",
                  "sudo rm -f /usr/share/keyrings/caddy-stable-archive-keyring.gpg.tmp",
                  "curl -1sLf '\''https://dl.cloudsmith.io/public/caddy/stable/gpg.key'\'' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg.tmp",
                  "sudo mv /usr/share/keyrings/caddy-stable-archive-keyring.gpg.tmp /usr/share/keyrings/caddy-stable-archive-keyring.gpg",
                  "curl -1sLf '\''https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt'\'' | sudo tee /etc/apt/sources.list.d/caddy-stable.list >/dev/null",
                  "sudo apt-get update",
                  "sudo apt-get install -y --no-install-recommends caddy",
                  "sudo install -d -m 0755 /etc/agent-feed /usr/local/bin",
                  "sudo install -d -m 0750 -o agent-feed -g agent-feed /var/lib/agent-feed",
                  ("aws s3 cp " + ($binary_s3_uri | @sh) + " /tmp/agent-feed.new"),
                  "sudo install -m 0755 -o root -g root /tmp/agent-feed.new /usr/local/bin/agent-feed",
                  ("printf %s " + ($caddy_b64 | @sh) + " | base64 -d | sudo tee /etc/caddy/Caddyfile >/dev/null"),
                  ("printf %s " + ($edge_env_b64 | @sh) + " | base64 -d | sudo tee /etc/agent-feed/edge.env >/dev/null"),
                  ("github_client_id=$(aws ssm get-parameter --name " + ($github_client_id_parameter | @sh) + " --with-decryption --query Parameter.Value --output text 2>/dev/null || true)"),
                  ("github_client_secret=$(aws ssm get-parameter --name " + ($github_client_secret_parameter | @sh) + " --with-decryption --query Parameter.Value --output text 2>/dev/null || true)"),
                  "if [ -n \"${github_client_id:-}\" ]; then printf '\''AGENT_FEED_GITHUB_CLIENT_ID=%s\\n'\'' \"$github_client_id\" | sudo tee -a /etc/agent-feed/edge.env >/dev/null; fi",
                  "if [ -n \"${github_client_secret:-}\" ]; then printf '\''AGENT_FEED_GITHUB_CLIENT_SECRET=%s\\n'\'' \"$github_client_secret\" | sudo tee -a /etc/agent-feed/edge.env >/dev/null; fi",
                  "sudo chmod 0640 /etc/agent-feed/edge.env",
                  "sudo chown root:agent-feed /etc/agent-feed/edge.env",
                  ("printf %s " + ($edge_toml_b64 | @sh) + " | base64 -d | sudo tee /etc/agent-feed/edge.toml >/dev/null"),
                  "sudo chmod 0644 /etc/agent-feed/edge.toml",
                  ("printf %s " + ($edge_service_b64 | @sh) + " | base64 -d | sudo tee /etc/systemd/system/agent-feed-edge.service >/dev/null"),
                  "sudo caddy validate --config /etc/caddy/Caddyfile",
                  "sudo systemctl daemon-reload",
                  "sudo systemctl restart agent-feed-edge",
                  "sudo systemctl restart caddy",
                  "sudo systemctl --no-pager --full status agent-feed-edge caddy"
                ]
              }'
          )"

          command_id="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$instance_id" \
              --document-name AWS-RunShellScript \
              --parameters "$parameters" \
              --query Command.CommandId \
              --output text
          )"
          echo "edge host sync command: ${command_id}"
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --instance-id "$instance_id" \
            --command-id "$command_id" || true
          invocation="$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --instance-id "$instance_id" \
            --command-id "$command_id" \
            --output json)"
          status="$(jq -r '.Status' <<<"$invocation")"
          jq -r '.StandardOutputContent' <<<"$invocation"
          jq -r '.StandardErrorContent' <<<"$invocation" >&2
          if [ "$status" != "Success" ]; then
            echo "edge host sync failed with status ${status}" >&2
            exit 1
          fi

      - name: edge health canary
        if: ${{ env.APPLY_TERRAFORM == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          url="${{ steps.terraform_outputs.outputs.edge_url }}/healthz"
          for attempt in $(seq 1 60); do
            if curl -fsSL --connect-timeout 5 --max-time 15 "$url" | grep -q ok; then
              exit 0
            fi
            echo "edge health not ready yet; retry ${attempt}/60"
            sleep 10
          done
          echo "edge health canary failed after waiting for ${url}" >&2
          exit 1

      - name: p2p fabric canary
        if: ${{ env.APPLY_TERRAFORM == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          edge_url="${{ steps.terraform_outputs.outputs.edge_url }}"
          edge_host="${edge_url#https://}"
          edge_host="${edge_host#http://}"
          edge_host="${edge_host%%/*}"

          for attempt in $(seq 1 30); do
            tcp_probe="$(
              timeout 5 bash -c "exec 3<>/dev/tcp/${edge_host}/7747; head -n 1 <&3" 2>/dev/null || true
            )"
            if grep -q 'agent-feed.edge/1' <<<"$tcp_probe"; then
              break
            fi
            echo "p2p tcp fabric not ready yet; retry ${attempt}/30"
            sleep 5
          done
          if ! grep -q 'agent-feed.edge/1' <<<"${tcp_probe:-}"; then
            echo "p2p tcp fabric canary failed for ${edge_host}:7747" >&2
            exit 1
          fi

          udp_probe="$(
            timeout 5 bash -c "exec 3<>/dev/udp/${edge_host}/7747; printf 'agent-feed-probe\n' >&3; head -n 1 <&3" 2>/dev/null || true
          )"
          if ! grep -q 'agent-feed.edge/1' <<<"$udp_probe"; then
            echo "p2p udp fabric canary failed for ${edge_host}:7747" >&2
            exit 1
          fi

      - name: browser and resolver canary
        if: ${{ env.APPLY_TERRAFORM == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          edge_url="${{ steps.terraform_outputs.outputs.edge_url }}"
          browser_url="${TF_VAR_browser_app_base_url%/}"
          canary="${TF_VAR_canary_github_login:-mosure}"

          ready_payload="$(curl -fsSL --connect-timeout 5 --max-time 15 "${edge_url}/readyz")"
          grep -Eq 'ready|"state":"ready"' <<<"$ready_payload"
          seed_payload="$(curl -fsSL --connect-timeout 5 --max-time 15 "${edge_url}/browser-seed")"
          grep -q '"signature"' <<<"$seed_payload"
          snapshot_payload="$(curl -fsSL --connect-timeout 5 --max-time 20 "${edge_url}/network/snapshot?network=mainnet")"
          grep -q '"feed_mode":"discovery"' <<<"$snapshot_payload"
          resolver_payload="$(curl -fsSL --connect-timeout 5 --max-time 20 "${edge_url}/resolve/github/${canary}?feed_mode=discovery")"
          grep -q '"github_user_id"' <<<"$resolver_payload"
          route_body="$(mktemp)"
          route_status="$(
            curl -sSL \
              --connect-timeout 5 \
              --max-time 20 \
              -o "$route_body" \
              -w '%{http_code}' \
              "${browser_url}/${canary}?feed_mode=discovery" || true
          )"
          if [[ "$route_status" != "200" && "$route_status" != "404" ]]; then
            echo "browser deep-link shell returned unexpected status ${route_status}" >&2
            cat "$route_body" >&2
            exit 1
          fi
          grep -q '<title>feed</title>' "$route_body"

      - name: edge diagnostics on failure
        if: ${{ failure() && env.APPLY_TERRAFORM == 'true' }}
        working-directory: ${{ env.TF_ROOT }}
        shell: bash
        run: |
          set -euo pipefail
          instance_id="$(terraform output -raw edge_instance_id 2>/dev/null || true)"
          if [ -z "$instance_id" ]; then
            echo "edge instance id unavailable; skipping diagnostics"
            exit 0
          fi

          parameters="$(
            jq -n '{
              commands: [
                "set -eu",
                "echo '\''--- caddy status ---'\''",
                "sudo systemctl --no-pager --full status caddy || true",
                "echo '\''--- agent-feed-edge status ---'\''",
                "sudo systemctl --no-pager --full status agent-feed-edge || true",
                "echo '\''--- caddyfile ---'\''",
                "sudo sed -n '\''1,220p'\'' /etc/caddy/Caddyfile || true",
                "echo '\''--- caddy certificates ---'\''",
                "sudo find /var/lib/caddy/.local/share/caddy -maxdepth 6 -type f | sort || true",
                "echo '\''--- loopback health ---'\''",
                "curl -v --max-time 10 http://127.0.0.1:7778/healthz || true",
                "echo '\''--- recent caddy logs ---'\''",
                "sudo journalctl -u caddy --since '\''45 minutes ago'\'' --no-pager | tail -n 240 || true",
                "echo '\''--- recent edge logs ---'\''",
                "sudo journalctl -u agent-feed-edge --since '\''45 minutes ago'\'' --no-pager | tail -n 160 || true"
              ]
            }'
          )"
          command_id="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$instance_id" \
              --document-name AWS-RunShellScript \
              --parameters "$parameters" \
              --query Command.CommandId \
              --output text
          )"
          echo "edge diagnostics command: ${command_id}"
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --instance-id "$instance_id" \
            --command-id "$command_id" || true
          invocation="$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --instance-id "$instance_id" \
            --command-id "$command_id" \
            --output json || true)"
          if [ -n "$invocation" ]; then
            jq -r '.StandardOutputContent // ""' <<<"$invocation"
            jq -r '.StandardErrorContent // ""' <<<"$invocation" >&2
          fi

      - name: dispatch pages publish
        if: ${{ env.APPLY_TERRAFORM == 'true' && env.DEPLOY_PAGES_AFTER_APPLY == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run deploy-pages.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f environment="$DEPLOY_ENVIRONMENT" \
            -f edge_base_url="${{ steps.terraform_outputs.outputs.edge_url }}" \
            -f browser_app_base_url="${{ steps.terraform_outputs.outputs.browser_app_url }}"
